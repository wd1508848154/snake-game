<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>橘子大王</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .game-container {
            text-align: center;
        }
        
        h1 {
            color: #00ff88;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        
        .score-title-board {
            color: #fff;
            font-size: 20px;
            margin-bottom: 10px;
        }
        
        .score {
            color: #00ff88;
            font-weight: bold;
        }
        
        .title {
            color: #ff8800;
            font-weight: bold;
        }
        
        canvas {
            border: 3px solid #00ff88;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            background: #0a0a0a;
        }
        
        /* 移动端控制按钮 */
        .mobile-controls {
            display: block;
            margin-top: 20px;
        }
        
        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            justify-content: center;
        }
        
        .d-btn {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 10px;
            background: rgba(0, 255, 136, 0.3);
            color: #00ff88;
            font-size: 24px;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.1s;
            box-shadow: 0 2px 4px rgba(0, 255, 136, 0.2);
        }
        
        .d-btn:active {
            background: rgba(0, 255, 136, 0.5);
            transform: scale(0.95);
        }
        
        .d-btn.up { grid-column: 2; grid-row: 1; }
        .d-btn.left { grid-column: 1; grid-row: 2; }
        .d-btn.right { grid-column: 3; grid-row: 2; }
        .d-btn.down { grid-column: 2; grid-row: 3; }
        
        /* 响应式设计 */
        @media (max-width: 500px) {
            canvas {
                width: 320px;
                height: 320px;
            }
            
            h1 {
                font-size: 24px;
            }
        }
        
        @media (max-width: 400px) {
            canvas {
                width: 280px;
                height: 280px;
            }
            
            .d-pad {
                grid-template-columns: repeat(3, 50px);
                grid-template-rows: repeat(3, 50px);
                gap: 4px;
            }
            
            .d-btn {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
        }
        
        .btn {
            background: #00ff88;
            color: #1a1a2e;
            border: none;
            padding: 10px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            background: #00cc6a;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4);
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px 50px;
            border-radius: 15px;
            border: 2px solid #ff4444;
            display: none;
        }
        
        .game-over h2 {
            color: #ff4444;
            margin-bottom: 15px;
        }
        
        .game-over p {
            color: #fff;
            margin-bottom: 20px;
        }
        
        .canvas-wrapper {
            position: relative;
            display: inline-block;
        }
        
        .start-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: block;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🍊 橘子大王</h1>
        <div class="score-title-board">
            分数: <span class="score" id="score">0</span> | 称号: <span class="title" id="title">学渣</span>
        </div>ss
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
            <div class="game-over" id="gameOver">
                <h2>游戏结束!</h2>
                <p>最终得分: <span id="finalScore">0</span></p>
                <button class="btn" onclick="restartGame()">重新开始</button>
            </div>
            <div class="start-button" id="startButton">
                <button class="btn" onclick="startGame()">开始游戏</button>
            </div>
        </div>
        <div class="mobile-controls">
            <div class="d-pad">
                <button class="d-btn up" ontouchstart="handleMobileControl('up')" onclick="handleMobileControl('up')">↑</button>
                <button class="d-btn left" ontouchstart="handleMobileControl('left')" onclick="handleMobileControl('left')">←</button>
                <button class="d-btn right" ontouchstart="handleMobileControl('right')" onclick="handleMobileControl('right')">→</button>
                <button class="d-btn down" ontouchstart="handleMobileControl('down')" onclick="handleMobileControl('down')">↓</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const titleElement = document.getElementById('title');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        const startButton = document.getElementById('startButton');

        // 游戏配置
        const gridSize = 40;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = null; // 普通食物
        let foodSpawnTimer = null; // 普通食物生成定时器
        let foodDuration = 10000; // 普通食物持续时间（10秒）
        let specialFood = null; // 特殊食物（游戏卡）
        let specialFoodDuration = Math.floor(Math.random() * 3000) + 5000; // 特殊食物持续时间（5-8秒随机）
        let specialFoodSpawnTimer = null; // 特殊食物生成定时器
        let direction = { x: 0, y: 0 };
        let nextDirection = { x: 0, y: 0 };
        let score = 0;
        let gameLoop = null;
        let gameSpeed = 300; // 速度改为原来的三分之一
        let isGameRunning = false;
        let isPaused = false;
        let headImage = new Image();
        headImage.src = 'king.png';
        
        // 游戏卡图片数组
        const gameCardImages = [
            'public/game-benghuai.png',
            'public/game-danzai.png',
            'public/game-heping.png',
            'public/game-nishuihan.png',
            'public/game-wanzhe.png',
            'public/game-yuanshen.png'
        ];
        
        // 游戏卡图片对象
        const gameCardImageObjects = gameCardImages.map(src => {
            const img = new Image();
            img.src = src;
            return img;
        });
        
        // 高中课程数组
        const courses = ['语文', '数学', '英语', '物理', '化学', '生物', '历史', '地理', '政治'];
        
        // 称号系统配置
        const titles = [
            { score: 0, title: '一中学渣' },
            { score: 50, title: '一中学弱' },
            { score: 100, title: '一中学生' },
            { score: 150, title: '一中学霸' },
            { score: 200, title: '一中学神' },
            { score: 300, title: '一中学圣' },
            { score: 500, title: '一中学仙' }
        ];
        
        // 音频上下文
        let audioContext;
        
        // 初始化音频
        function initAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        // 播放背景音乐
        function playBackgroundMusic() {
            if (!audioContext) initAudio();
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(261.63, audioContext.currentTime); // C4
            oscillator.frequency.exponentialRampToValueAtTime(293.66, audioContext.currentTime + 1); // D4
            oscillator.frequency.exponentialRampToValueAtTime(329.63, audioContext.currentTime + 2); // E4
            oscillator.frequency.exponentialRampToValueAtTime(349.23, audioContext.currentTime + 3); // F4
            oscillator.frequency.exponentialRampToValueAtTime(392.00, audioContext.currentTime + 4); // G4
            oscillator.frequency.exponentialRampToValueAtTime(440.00, audioContext.currentTime + 5); // A4
            oscillator.frequency.exponentialRampToValueAtTime(493.88, audioContext.currentTime + 6); // B4
            oscillator.frequency.exponentialRampToValueAtTime(523.25, audioContext.currentTime + 7); // C5
            
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 8);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 8);
        }
        
        // 播放吃食物音效
        function playEatSound() {
            if (!audioContext) initAudio();
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // C5
            oscillator.frequency.exponentialRampToValueAtTime(783.99, audioContext.currentTime + 0.2); // G5
            
            gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.2);
        }
        
        // 播放游戏结束音效
        function playGameOverSound() {
            if (!audioContext) initAudio();
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime); // C5
            oscillator.frequency.exponentialRampToValueAtTime(261.63, audioContext.currentTime + 0.5); // C4
            
            gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }
        
        // 更新称号
        function updateTitle() {
            for (let i = titles.length - 1; i >= 0; i--) {
                if (score >= titles[i].score) {
                    titleElement.textContent = titles[i].title;
                    break;
                }
            }
        }

        // 初始化游戏
        function init() {
            snake = [
                { x: 10, y: 10 }
            ];
            direction = { x: 0, y: 0 };
            nextDirection = { x: 0, y: 0 };
            score = 0;
            scoreElement.textContent = score;
            gameSpeed = 300; // 速度改为原来的三分之一
            isPaused = false;
            food = null; // 初始化普通食物
            specialFood = null; // 初始化特殊食物
            updateTitle(); // 初始化称号
        }

        // 生成食物
        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount),
                course: courses[Math.floor(Math.random() * courses.length)],
                spawnTime: Date.now()
            };
            
            // 确保食物不在蛇身上
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    spawnFood();
                    return;
                }
            }
            
            // 确保食物不在特殊食物位置
            if (specialFood && specialFood.x === food.x && specialFood.y === food.y) {
                spawnFood();
                return;
            }
        }
        
        // 生成特殊食物（游戏卡）
        function spawnSpecialFood() {
            // 随机位置
            const x = Math.floor(Math.random() * tileCount);
            const y = Math.floor(Math.random() * tileCount);
            
            // 确保不在蛇身上
            for (let segment of snake) {
                if (segment.x === x && segment.y === y) {
                    spawnSpecialFood();
                    return;
                }
            }
            
            // 确保不在普通食物位置
            if (food.x === x && food.y === y) {
                spawnSpecialFood();
                return;
            }
            
            // 随机特殊食物持续时间（5-8秒）
            specialFoodDuration = Math.floor(Math.random() * 3000) + 5000;
            
            // 生成特殊食物
            specialFood = {
                x: x,
                y: y,
                value: Math.floor(Math.random() * 81) + 20, // 20-100分
                imageIndex: Math.floor(Math.random() * gameCardImageObjects.length),
                spawnTime: Date.now()
            };
            specialFoodTimer = Date.now();
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格（可选，增加视觉效果）
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1;
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制蛇
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // 蛇头 - 使用图片
                    ctx.drawImage(
                        headImage,
                        segment.x * gridSize,
                        segment.y * gridSize,
                        gridSize,
                        gridSize
                    );
                } else {
                    // 蛇身
                    const gradient = 1 - (index / snake.length) * 0.5;
                    ctx.fillStyle = `rgba(0, 255, 136, ${gradient})`;
                    ctx.shadowBlur = 0;
                    ctx.fillRect(
                        segment.x * gridSize + 1,
                        segment.y * gridSize + 1,
                        gridSize - 2,
                        gridSize - 2
                    );
                }
            });

            // 绘制食物
            if (food) {
                ctx.fillStyle = '#ff4444';
                ctx.shadowColor = '#ff4444';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(
                    food.x * gridSize + gridSize / 2,
                    food.y * gridSize + gridSize / 2,
                    gridSize / 2 - 2,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // 绘制课程名称
                ctx.fillStyle = '#ffffff';
                ctx.font = '10px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(
                    food.course,
                    food.x * gridSize + gridSize / 2,
                    food.y * gridSize + gridSize / 2
                );
            }
            
            // 绘制特殊食物（游戏卡）
            if (specialFood) {
                // 计算剩余时间
                const elapsedTime = Date.now() - specialFood.spawnTime;
                const remainingTime = Math.max(0, Math.ceil((specialFoodDuration - elapsedTime) / 1000));
                
                // 绘制背景
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.fillRect(
                    specialFood.x * gridSize,
                    specialFood.y * gridSize,
                    gridSize,
                    gridSize
                );
                
                // 绘制游戏卡图片
                const img = gameCardImageObjects[specialFood.imageIndex];
                ctx.drawImage(
                    img,
                    specialFood.x * gridSize + 2,
                    specialFood.y * gridSize + 2,
                    gridSize - 4,
                    gridSize - 4
                );
                
                // 绘制分数（向上超出）
                ctx.fillStyle = '#00ff88';
                ctx.font = '10px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText(
                    '+' + specialFood.value,
                    specialFood.x * gridSize + gridSize / 2,
                    specialFood.y * gridSize - 2
                );
                
                // 绘制倒计时（向下超出）
                ctx.fillStyle = '#ff0000';
                ctx.font = '10px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillText(
                    remainingTime + 's',
                    specialFood.x * gridSize + gridSize / 2,
                    specialFood.y * gridSize + gridSize + 2
                );
            }

            // 暂停提示
            if (isPaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00ff88';
                ctx.font = 'bold 30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('暂停', canvas.width / 2, canvas.height / 2);
            }
        }

        // 更新游戏状态
        function update() {
            if (isPaused) return;

            // 更新方向
            direction = { ...nextDirection };

            // 如果蛇还没开始移动，不更新
            if (direction.x === 0 && direction.y === 0) return;

            // 新的蛇头位置
            const head = { ...snake[0] };
            head.x += direction.x;
            head.y += direction.y;

            // 撞墙检测
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // 撞自己检测
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            // 移动蛇
            snake.unshift(head);

            // 吃普通食物检测
            if (food && head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                spawnFood();
                playEatSound(); // 播放吃食物音效
                updateTitle(); // 更新称号
            } 
            // 吃特殊食物检测
            else if (specialFood && head.x === specialFood.x && head.y === specialFood.y) {
                score += specialFood.value;
                scoreElement.textContent = score;
                playEatSound(); // 播放吃食物音效
                updateTitle(); // 更新称号
                specialFood = null; // 清除特殊食物
            } else {
                snake.pop();
            }
            
            // 普通食物消失逻辑
            if (food) {
                const elapsedTime = Date.now() - food.spawnTime;
                if (elapsedTime >= foodDuration) {
                    food = null;
                }
            }
            
            // 特殊食物消失逻辑
            if (specialFood) {
                const elapsedTime = Date.now() - specialFood.spawnTime;
                if (elapsedTime >= specialFoodDuration) {
                    specialFood = null;
                }
            }
        }

        // 游戏步骤
        function gameStep() {
            update();
            draw();
        }

        // 游戏结束
        function gameOver() {
            isGameRunning = false;
            clearInterval(gameLoop);
            // 清除普通食物生成定时器
            if (foodSpawnTimer) {
                clearTimeout(foodSpawnTimer);
                foodSpawnTimer = null;
            }
            // 清除特殊食物生成定时器
            if (specialFoodSpawnTimer) {
                clearTimeout(specialFoodSpawnTimer);
                specialFoodSpawnTimer = null;
            }
            finalScoreElement.textContent = score;
            gameOverElement.style.display = 'block';
            // 不显示开始按钮，只显示游戏结束界面中的重新开始按钮
            playGameOverSound(); // 播放游戏结束音效
        }

        // 开始游戏
        function startGame() {
            if (isGameRunning) return;
            
            init();
            isGameRunning = true;
            gameOverElement.style.display = 'none';
            startButton.style.display = 'none'; // 隐藏开始按钮
            
            // 设置初始方向为向右
            nextDirection = { x: 1, y: 0 };
            
            gameLoop = setInterval(gameStep, gameSpeed);
            playBackgroundMusic(); // 播放背景音乐
            
            // 启动普通食物生成定时器
            startFoodSpawnTimer();
            // 启动特殊食物生成定时器
            startSpecialFoodSpawnTimer();
        }
        
        // 启动普通食物生成定时器
        function startFoodSpawnTimer() {
            if (foodSpawnTimer) {
                clearTimeout(foodSpawnTimer);
            }
            
            // 2-4秒随机生成普通食物
            const randomTime = Math.floor(Math.random() * 2000) + 2000; // 2000-4000毫秒
            
            foodSpawnTimer = setTimeout(() => {
                if (isGameRunning && !food) {
                    spawnFood();
                }
                // 递归调用，继续生成
                startFoodSpawnTimer();
            }, randomTime);
        }
        
        // 启动特殊食物生成定时器
        function startSpecialFoodSpawnTimer() {
            if (specialFoodSpawnTimer) {
                clearTimeout(specialFoodSpawnTimer);
            }
            
            // 3-5秒随机生成特殊食物
            const randomTime = Math.floor(Math.random() * 2000) + 3000; // 3000-5000毫秒
            
            specialFoodSpawnTimer = setTimeout(() => {
                if (isGameRunning && !specialFood) {
                    spawnSpecialFood();
                }
                // 递归调用，继续生成
                startSpecialFoodSpawnTimer();
            }, randomTime);
        }

        // 重新开始
        function restartGame() {
            gameOverElement.style.display = 'none';
            startGame();
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;

            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y === 0) {
                        nextDirection = { x: 0, y: -1 };
                    }
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y === 0) {
                        nextDirection = { x: 0, y: 1 };
                    }
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x === 0) {
                        nextDirection = { x: -1, y: 0 };
                    }
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x === 0) {
                        nextDirection = { x: 1, y: 0 };
                    }
                    e.preventDefault();
                    break;
                case ' ':
                    isPaused = !isPaused;
                    e.preventDefault();
                    break;
            }
        });

        // 移动端控制
        function handleMobileControl(dir) {
            if (!isGameRunning) return;
            
            switch(dir) {
                case 'up':
                    if (direction.y === 0) {
                        nextDirection = { x: 0, y: -1 };
                    }
                    break;
                case 'down':
                    if (direction.y === 0) {
                        nextDirection = { x: 0, y: 1 };
                    }
                    break;
                case 'left':
                    if (direction.x === 0) {
                        nextDirection = { x: -1, y: 0 };
                    }
                    break;
                case 'right':
                    if (direction.x === 0) {
                        nextDirection = { x: 1, y: 0 };
                    }
                    break;
            }
        }
        
        // 防止页面滚动
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
        
        // 初始绘制
        init();
        draw();
    </script>
</body>
</html>
